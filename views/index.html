<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhoWins - Animal Battle Stories</title>
  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --border: #2a2d3a;
      --text: #e4e4e7;
      --muted: #71717a;
      --accent: #3b82f6;
      --facts: #6366f1;
      --age5: #f59e0b;
      --age6: #ec4899;
      --age8: #8b5cf6;
      --jp: #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      padding: 40px 20px 30px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    header h1 span { color: var(--accent); }

    header p {
      color: var(--muted);
      margin-top: 8px;
      font-size: 0.95rem;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 30px 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    thead th {
      padding: 14px 16px;
      text-align: left;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    tbody td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.03); }

    .matchup a {
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
      font-size: 1.05rem;
    }

    .matchup a:hover { color: var(--accent); }

    .btn {
      display: inline-block;
      padding: 5px 14px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      text-decoration: none;
      color: #fff;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.8; }

    .btn-facts { background: var(--facts); }
    .btn-age5 { background: var(--age5); color: #000; }
    .btn-age6 { background: var(--age6); }
    .btn-age8 { background: var(--age8); }
    .btn-jp { background: var(--jp); }

    .date {
      color: var(--muted);
      font-size: 0.85rem;
      white-space: nowrap;
    }

    .help {
      text-align: center;
      margin-top: 30px;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .help code {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.82rem;
    }

    @media (max-width: 700px) {
      table { font-size: 0.85rem; }
      thead th, tbody td { padding: 10px 8px; }
      .btn { padding: 4px 10px; font-size: 0.75rem; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Who <span>Wins</span>?</h1>
    <p>Animal battle stories backed by real biology</p>
  </header>

  <div class="container">
    <table>
      <thead>
        <tr>
          <th>Who vs Who</th>
          <th>Facts</th>
          <th>4-5yo</th>
          <th>5-6yo</th>
          <th>7-8yo</th>
          <th>JP 4-5</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody>
        <!--ROWS-->
      </tbody>
    </table>

    <p class="help">
      Add battles: <code>node import.js "Animal 1" "Animal 2" /path/to/file.html</code>
    </p>
  </div>

</body>
</html>
